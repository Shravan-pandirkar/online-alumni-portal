<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Alumni Chat | SGDTP Portal</title>
  <link rel="stylesheet" href="/static/css/chat_feature.css" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <span class="logo-icon"><i class="fa-solid fa-graduation-cap"></i></span>
        <div>
          <p class="logo-title">SGDTP</p>
          <p class="logo-sub">Alumni Chat</p>
        </div>
      </div>
      <button class="sidebar-close" id="sidebarClose"><i class="fa-solid fa-xmark"></i></button>
    </div>

    <div class="search-wrap">
      <i class="fa-solid fa-magnifying-glass search-icon"></i>
      <input type="text" id="searchInput" placeholder="Search alumni..." autocomplete="off"/>
    </div>

    <div class="filter-tabs">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="online">Online</button>
      <button class="filter-btn" data-filter="unread">Unread</button>
    </div>

    <div class="contacts-list" id="contactsList"></div>
  </aside>

  <!-- ===== OVERLAY ===== -->
  <div class="overlay" id="overlay"></div>

  <!-- ===== MAIN CHAT AREA ===== -->
  <main class="chat-main">

    <!-- Empty state -->
    <div class="empty-state" id="emptyState">
      <div class="empty-icon"><i class="fa-solid fa-comments"></i></div>
      <h2>Welcome to Alumni Chat</h2>
      <p>Select an alumni from the list to start a conversation</p>
      <button class="btn-primary" id="openSidebarBtn">
        <i class="fa-solid fa-user-group"></i> Browse Alumni
      </button>
    </div>

    <!-- Chat window -->
    <div class="chat-window" id="chatWindow" style="display:none;">

      <!-- ── Chat Header ── -->
      <div class="chat-header">
        <button class="back-btn" id="backBtn"><i class="fa-solid fa-arrow-left"></i></button>
        <div class="chat-header-avatar" id="headerAvatar"></div>
        <div class="chat-header-info">
          <h3 id="headerName">Alumni Name</h3>
          <span class="header-status" id="headerStatus"></span>
        </div>

        <!-- Select mode toolbar (shown only in select mode) -->
        <div class="select-toolbar" id="selectToolbar" style="display:none;">
          <span class="select-count" id="selectCount">0 selected</span>
          <button class="action-btn delete-selected-btn" id="deleteSelectedBtn" title="Delete Selected">
            <i class="fa-solid fa-trash"></i>
          </button>
          <button class="action-btn" id="cancelSelectBtn" title="Cancel">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>

        <!-- Normal header actions -->
        <div class="chat-header-actions" id="headerActions">
          

          <!-- More Options button -->
          <button class="action-btn more-btn" id="moreBtn" title="More Options">
            <i class="fa-solid fa-ellipsis-vertical"></i>
          </button>

          <!-- Dropdown menu -->
          <div class="more-dropdown" id="moreDropdown">
            <button class="dropdown-item" id="selectMsgsBtn">
              <i class="fa-solid fa-check-square"></i> Select Messages
            </button>
            <button class="dropdown-item" id="clearChatBtn">
              <i class="fa-solid fa-broom"></i> Clear My Chat
            </button>
          </div>
        </div>
      </div>

      <!-- Messages Area -->
      <div class="messages-area" id="messagesArea"></div>

      <!-- Typing Indicator -->
      <div class="typing-indicator" id="typingIndicator" style="display:none;">
        <span id="typingName"></span> is typing
        <span class="dots"><span></span><span></span><span></span></span>
      </div>

      <!-- Message Input -->
      <div class="message-input-area">
        <button class="attach-btn" title="Attach File"><i class="fa-solid fa-paperclip"></i></button>
        <div class="input-wrap">
          <textarea id="messageInput" placeholder="Type a message..." rows="1"></textarea>
          <button class="emoji-btn" id="emojiBtn" title="Emoji"><i class="fa-regular fa-face-smile"></i></button>
        </div>
        <button class="send-btn" id="sendBtn">
          <i class="fa-solid fa-paper-plane"></i>
        </button>
      </div>

      <!-- Emoji Picker -->
      <div class="emoji-picker" id="emojiPicker" style="display:none;">
        <div class="emoji-grid" id="emojiGrid"></div>
      </div>

    </div><!-- /chat-window -->
  </main>

  <!-- ===== CONFIRM DELETE MODAL ===== -->
  <div class="modal" id="deleteModal" style="display:none;">
    <div class="modal-content">
      <div style="font-size:32px;margin-bottom:12px;">🗑️</div>
      <h3 id="deleteModalTitle">Delete Messages?</h3>
      <p id="deleteModalDesc">This will delete the selected messages only for you.</p>
      <div class="modal-actions">
        <button class="danger" id="confirmDeleteBtn">Delete</button>
        <button id="cancelDeleteBtn">Cancel</button>
      </div>
    </div>
  </div>

  <script type="module" src="/static/js/chat_feature.js"></script>
</body>
</html>
