<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/static/images/alumni_web_icon.webp">
    <title>See Events — SGDTP Alumni Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/Events.css">
    <script type="module" src="/static/js/Events.js"></script>
</head>
<body>

    <!-- ── HEADER ── -->
    <header class="header">
        <div class="logo">SGDTP Alumni Portal</div>
        <nav class="nav">
            <a href="/templates/Events.html" target="_blank" class="login-link">🎉 See Events</a>
            <a href="{{ url_for('login') }}" target="_blank" class="login-link">🗝️ Login</a>
            <a href="{{ url_for('register') }}" target="_blank" class="register-link">🔑 Register</a>
            <!-- Dark / Light mode toggle — same as Dashboard & FrontPage -->
            <button id="themeToggle" class="theme-toggle-btn" title="Toggle light/dark mode">
                <span id="themeIcon">☀️</span>
                <span class="burst-ring"></span>
            </button>
        </nav>
    </header>

    <!-- ── PAGE CONTENT ── -->
    <main class="events-main">
        <div class="events-header fade-in">
            <h1 class="eventstext">College Events 🎉</h1>
        </div>

        <div id="loader" class="loader hidden"></div>
        <div id="alumniGrid"></div>
        <div id="eventsList"></div>
    </main>

</body>
</html>
