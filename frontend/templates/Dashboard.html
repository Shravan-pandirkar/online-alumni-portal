<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="/static/images/alumni_web_icon.webp">
    <title>Dashboard</title>
    <link rel="stylesheet" href="/static/css/Dashboard.css">
</head>

<!-- Delete Confirmation Modal -->
<div id="deleteModal" class="modal hidden">
  <div class="modal-content">
    <h3>Delete Event</h3>
    <p>Are you sure you want to delete this event?</p>
    <div class="modal-actions">
      <button id="confirmDeleteBtn" class="danger">Delete</button>
      <button id="cancelDeleteBtn">Cancel</button>
    </div>
  </div>
</div>

<body>

<!-- ── HEADER ─────────────────────────────────────────────── -->
<header class="header">
  <div class="logo">SGDTP Alumni Portal</div>
  <nav class="nav">
    <a href="{{ url_for('profile') }}" class="register-link">👤 My Profile</a>
    <button onclick="showSection('alumni')">🔎 Search Alumni</button>
    <button onclick="showSection('events')">🥳 Events</button>
    <!-- Chat link is injected dynamically based on role -->
    <span id="chatNavLink"></span>
    <!-- Dark / Light mode toggle -->
    <button id="themeToggle" class="theme-toggle-btn" title="Toggle light/dark mode">
      <span id="themeIcon">☀️</span>
    </button>
  </nav>
</header>

<!-- ── POPUP TOAST ─────────────────────────────────────────── -->
<div id="popup" class="popup hidden">
  <span id="popupMessage"></span>
</div>

<!-- ── DASHBOARD LAYOUT ───────────────────────────────────── -->
<div class="dashboard">
  <!-- Sidebar can be injected here if needed -->
</div>

<div class="content" id="content">

  <!-- SEARCH VIEW -->
  <section id="searchView" class="view">
    <div class="search-header">
      <h1 class="searchtext">Search Alumni or Students</h1>
      <div class="search-input-wrapper">
        <input type="text" id="alumniSearch" placeholder="Search by name, year, company, department...">
      </div>
    </div>
    <div id="loader" class="loader hidden"></div>
    <div class="alumni-grid" id="alumniGrid">
      <!-- Alumni cards load here dynamically -->
    </div>
  </section>

  <!-- EVENTS VIEW -->
  <section id="eventsView" class="view" style="display:none">
    <h1 class="eventstext">Upcoming Events 🎉</h1>
    <div id="eventsList"></div>
  </section>

</div>

<script type="module" src="/static/js/Dashboard.js"></script>
</body>
</html>
