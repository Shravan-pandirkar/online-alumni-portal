<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/static/images/alumni_web_icon.webp">
    <title>Register — SGDTP Alumni Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/registration_page.css">
</head>
<body>

    <!-- Popup Message -->
    <div id="popup" class="popup hidden">
        <span id="popupMessage"></span>
    </div>

    <header class="header">
        <div class="logo">SGDTP Alumni Portal</div>
        <nav class="nav">
            <a href="{{ url_for('login') }}"    class="login-link">🔑 Login</a>
            <a href="{{ url_for('register') }}" class="register-link">✨ Register</a>
            <!-- Dark / Light mode toggle — same as all other pages -->
            <button id="themeToggle" class="theme-toggle-btn" title="Toggle light/dark mode">
                <span id="themeIcon">☀️</span>
            </button>
        </nav>
    </header>

    <main class="container">
        <div class="register-card">
            <h1>REGISTER</h1>
            <div id="error-message" class="message-box"></div>
            <form id="registerForm">
                <div class="input-group">
                    <input type="email" name="username" placeholder="Enter the email" required>
                    <label>📧 Email</label>
                </div>
                <div class="input-group">
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" placeholder="Enter the Password" required>
                        <span class="toggle-password" onclick="togglePassword('password')">Show</span>
                    </div>
                    <label>🔑 Password</label>
                </div>
                <button type="submit" class="register-btn">Register</button>
            </form>
        </div>
    </main>

    <script type="module" src="/static/js/Register.js"></script>
</body>
</html>
